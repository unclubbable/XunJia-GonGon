server:
  port: 9003

spring:
  application:
    name: service-dispatch
  cloud:
    nacos:
      discovery:
        server-addr: 000.000.000.000:8848
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://000.000.000.000:3303/service-order?characterEncoding=utf-8&serverTimezone=GMT%2B8
    username: root
    password: 000000
    hikari:
      # 连接池最大连接数
      maximum-pool-size: 10
      # 最小空闲连接数
      minimum-idle: 5
      # 空闲连接存活最大时间（毫秒），默认 600000（10分钟）
      idle-timeout: 600000
      # 连接最大存活时间（毫秒），默认 1800000（30分钟），应小于 MySQL 的 wait_timeout
      max-lifetime: 1800000
      # 获取连接超时时间（毫秒），默认 30000
      connection-timeout: 30000
      # 连接测试查询（MySQL 推荐 SELECT 1）
      connection-test-query: SELECT 1
      # 验证超时（毫秒）
      validation-timeout: 5000
      # 心跳间隔（毫秒），定期发送 ping 保持连接活跃（HikariCP 3.4.0+ 支持）
      keepalive-time: 30000   # 每30秒一次心跳
  redis:
    host: 000.000.000.000
    port: 6379
    password: 000000
    #用redis的第 0个数据库
    database: 0
    timeout: 1800000
    lettuce:
      pool:
        max-active: 20
        max-wait: -1
        #最大阻塞等待时间(负数表示没限制)
        max-idle: 5
        min-idle: 0
  # RabbitMQ 配置
  rabbitmq:
    host: 000.000.000.000       # RabbitMQ地址
    port: 5672            # 默认端口
    username: admin       # 默认用户名
    password: 123       # 默认密码
    virtual-host: /       # 虚拟主机
    # 消息确认配置（保证消息可靠发送）
    publisher-confirm-type: correlated
    publisher-returns: true
    # 关键配置：手动确认消息（对标Kafka手动提交偏移量）
    listener:
      simple:
        acknowledge-mode: manual  # 手动ACK
        concurrency: 2            # 并发2个线程
        max-concurrency: 2
        batch-size: 10            # 批量消费
        retry:
          enabled: true             # 开启消费者重试
          initial-interval: 4000ms  # 第一次重试间隔
          multiplier: 1             # 重试间隔倍数
          max-attempts: 2           # 最大重试次数


logging:
  level:
    com.taxi.dispatch: debug
  pattern:
    dateformat: HH:mm:ss:SSS
