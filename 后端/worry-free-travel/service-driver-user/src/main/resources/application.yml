server:
  port: 8086

spring:
  application:
    name: service-driver-user
  cloud:
    nacos:
      discovery:
        server-addr: 000.000.000.000:8848
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://000.000.000.000:3303/service-driver-user?characterEncoding=utf-8&serverTimezone=GMT%2B8
    username: root
    password: 000000
    hikari:
      # 连接池最大连接数
      maximum-pool-size: 10
      # 最小空闲连接数
      minimum-idle: 5
      # 空闲连接存活最大时间（毫秒），默认 600000（10分钟）
      idle-timeout: 600000
      # 连接最大存活时间（毫秒），默认 1800000（30分钟），应小于 MySQL 的 wait_timeout
      max-lifetime: 1800000
      # 获取连接超时时间（毫秒），默认 30000
      connection-timeout: 30000
      # 连接测试查询（MySQL 推荐 SELECT 1）
      connection-test-query: SELECT 1
      # 验证超时（毫秒）
      validation-timeout: 5000
      # 心跳间隔（毫秒），定期发送 ping 保持连接活跃（HikariCP 3.4.0+ 支持）
      keepalive-time: 30000   # 每30秒一次心跳
  redis:
    host: 000.000.000.000
    port: 6379
    password: 000000
    #用redis的第 0个数据库
    database: 0
    timeout: 1800000
    lettuce:
      pool:
        max-active: 20
        max-wait: -1
        #最大阻塞等待时间(负数表示没限制)
        max-idle: 5
        min-idle: 0
  # RabbitMQ 配置
  rabbitmq:
    host: 000.000.000.000       # RabbitMQ地址
    port: 5672            # 默认端口
    username: admin       # 默认用户名
    password: 123       # 默认密码
    virtual-host: /       # 虚拟主机
    listener:
      simple:
        prefetch: 1 # 每次只能获取一条消息，处理完成才能获取下一个消息
      #发送者重连机制
      connection-timeout: 1s # 设置MQ的连接超时时间
      template:
        retry:
          enabled: true # 开启超时重试机制
          initial-interval: 1000ms # 失败后的初始等待时间
          multiplier: 1 # 失败后下次的等待时长倍数，下次等待时长 = initial-interval * multiplier
          max-attempts: 3 # 最大重试次数
logging:
  level:
    com.taxi.driverUser: debug
  pattern:
    dateformat: HH:mm:ss:SSS
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
knife4j:
  enable: true
  openapi:
    group:
      default:
        api-rule-resources:
          - com.taxi.driverUser
