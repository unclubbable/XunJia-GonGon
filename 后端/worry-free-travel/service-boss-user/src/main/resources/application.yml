server:
  port: 8089

spring:
  application:
    name: user-boss
  cloud:
    nacos:
      discovery:
        server-addr: 000.000.000.000:8848
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://000.000.000.000:3303/service-user?characterEncoding=utf-8&serverTimezone=GMT%2B8
    username: root
    password: 000000
    hikari:
      # 连接池最大连接数
      maximum-pool-size: 10
      # 最小空闲连接数
      minimum-idle: 5
      # 空闲连接存活最大时间（毫秒），默认 600000（10分钟）
      idle-timeout: 600000
      # 连接最大存活时间（毫秒），默认 1800000（30分钟），应小于 MySQL 的 wait_timeout
      max-lifetime: 1800000
      # 获取连接超时时间（毫秒），默认 30000
      connection-timeout: 30000
      # 连接测试查询（MySQL 推荐 SELECT 1）
      connection-test-query: SELECT 1
      # 验证超时（毫秒）
      validation-timeout: 5000
      # 心跳间隔（毫秒），定期发送 ping 保持连接活跃（HikariCP 3.4.0+ 支持）
      keepalive-time: 30000   # 每30秒一次心跳


knife4j:
  enable: true
